# Build DB Studio for Linux, Windows, and macOS and publish to GitHub Releases.
#
# Create a release:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Or run manually: Actions → Release → Run workflow

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (must match tauri.conf.json version, e.g. v0.1.0)
        required: true
        default: v0.1.0

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            name: linux
            args: ''
          - platform: windows-latest
            name: windows
            args: ''
          - platform: macos-latest
            name: macos-aarch64
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            name: macos-x64
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    name: build-${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.name, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential

      - name: Install frontend dependencies
        run: npm ci

      # Build and upload distribution bundles (dmg, deb, rpm, AppImage, msi, exe).
      # We intentionally skip the built-in latest.json generation because tauri-action
      # re-packages the .app.tar.gz AFTER Tauri signs it, so the signature becomes
      # invalid. We handle latest.json ourselves in the publish-updater-json job below.
      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: DB Studio ${{ env.RELEASE_TAG }}
          releaseBody: |
            ## DB Studio ${{ env.RELEASE_TAG }}

            ### macOS
            - Apple Silicon (`.dmg` / `.app`): `aarch64-apple-darwin` asset
            - Intel Mac (`.dmg` / `.app`): `x86_64-apple-darwin` asset

            > **"damaged and can't be opened"?** macOS Gatekeeper blocks apps not signed with a paid Apple certificate. Run this once after downloading:
            > ```bash
            > xattr -cr /Applications/db-studio.app
            > ```
            > Or: right-click the `.dmg` → Open → Open Anyway in System Settings → Privacy & Security.

            ### Linux
            - `.deb` / `.AppImage` / `.rpm` (check assets below)

            ### Windows
            - `.msi` installer (recommended)
            - `.exe` NSIS setup if present

            Built from commit ${{ github.sha }}.
          releaseDraft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          tauriScript: npx tauri
          args: ${{ matrix.args }}
          includeUpdaterJson: false

      # ── Collect the Tauri-signed updater bundles ──────────────────────────────
      # We re-upload the Tauri-signed file under a predictable name and save the
      # .sig content as a GitHub Actions artifact for the final job.

      - name: Upload macOS aarch64 updater bundle + sig
        if: matrix.name == 'macos-aarch64'
        shell: bash
        run: |
          BUNDLE="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/db-studio.app.tar.gz"
          gh release upload "${{ env.RELEASE_TAG }}" "$BUNDLE#db-studio_aarch64.app.tar.gz" --clobber
          cp "${BUNDLE}.sig" updater.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS x64 updater bundle + sig
        if: matrix.name == 'macos-x64'
        shell: bash
        run: |
          BUNDLE="src-tauri/target/x86_64-apple-darwin/release/bundle/macos/db-studio.app.tar.gz"
          gh release upload "${{ env.RELEASE_TAG }}" "$BUNDLE#db-studio_x64.app.tar.gz" --clobber
          cp "${BUNDLE}.sig" updater.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux updater bundle + sig
        if: matrix.name == 'linux'
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          BUNDLE="src-tauri/target/release/bundle/appimage/db-studio_${VERSION}_amd64.AppImage.tar.gz"
          gh release upload "${{ env.RELEASE_TAG }}" "$BUNDLE#db-studio_amd64.AppImage.tar.gz" --clobber
          cp "${BUNDLE}.sig" updater.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows updater bundle + sig
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $bundle = "src-tauri/target/release/bundle/msi/db-studio_${version}_x64_en-US.msi.zip"
          gh release upload "${{ env.RELEASE_TAG }}" "${bundle}#db-studio_x64_en-US.msi.zip" --clobber
          Copy-Item "${bundle}.sig" updater.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save sig artifact
        uses: actions/upload-artifact@v4
        with:
          name: sig-${{ matrix.name }}
          path: updater.sig
          if-no-files-found: warn

  # ── Generate latest.json from collected signatures ───────────────────────────
  publish-updater-json:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all sig artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sig-*

      - name: Generate and upload latest.json
        run: |
          export VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          export TAG="${{ env.RELEASE_TAG }}"
          export BASE="https://github.com/broisnischal/studio/releases/download/${TAG}"

          node - <<'JSEOF'
          const fs = require('fs')
          const version = process.env.VERSION
          const base    = process.env.BASE

          const read = (f) => {
            try { return fs.readFileSync(f, 'utf8').trim() } catch { return '' }
          }

          const platforms = {}

          const add = (key, sigPath, url) => {
            const sig = read(sigPath)
            if (sig) platforms[key] = { signature: sig, url }
            else console.warn(`No sig at ${sigPath} — skipping ${key}`)
          }

          add('darwin-aarch64', 'sig-macos-aarch64/updater.sig', `${base}/db-studio_aarch64.app.tar.gz`)
          add('darwin-x86_64',  'sig-macos-x64/updater.sig',     `${base}/db-studio_x64.app.tar.gz`)
          add('linux-x86_64',   'sig-linux/updater.sig',         `${base}/db-studio_amd64.AppImage.tar.gz`)
          add('windows-x86_64', 'sig-windows/updater.sig',       `${base}/db-studio_x64_en-US.msi.zip`)

          const json = {
            version,
            notes: `See https://github.com/broisnischal/studio/releases/tag/v${version}`,
            pub_date: new Date().toISOString(),
            platforms,
          }

          fs.writeFileSync('latest.json', JSON.stringify(json, null, 2))
          console.log('Generated latest.json:')
          console.log(JSON.stringify(json, null, 2))

          if (!Object.keys(platforms).length) {
            console.error('ERROR: no platform signatures found')
            process.exit(1)
          }
          JSEOF

      - name: Upload latest.json to release
        run: gh release upload "${{ env.RELEASE_TAG }}" latest.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
