# Build DB Studio for Linux, Windows, and macOS and publish to GitHub Releases.
#
# Create a release:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Or run manually: Actions → Release → Run workflow

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (must match tauri.conf.json version, e.g. v0.1.0)
        required: true
        default: v0.1.0

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

# ── 1. Create the release before any build starts ────────────────────────────
jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.RELEASE_TAG }}
          SHA: ${{ github.sha }}
        run: |
          PRERELEASE=""
          [[ "$TAG" == *-* ]] && PRERELEASE="--prerelease"

          cat > /tmp/notes.md << EOF
          ## DB Studio ${TAG}

          ### macOS
          - Apple Silicon: \`db-studio_*_aarch64.dmg\`
          - Intel Mac: \`db-studio_*_x64.dmg\`

          > **"damaged and can't be opened"?** macOS Gatekeeper blocks unsigned apps. Run once after installing:
          > \`\`\`bash
          > xattr -cr /Applications/db-studio.app
          > \`\`\`
          > Or: right-click the .dmg → Open → Open Anyway in System Settings → Privacy & Security.

          ### Linux
          - \`.deb\` / \`.AppImage\` / \`.rpm\` (see assets below)

          ### Windows
          - \`.exe\` NSIS setup (recommended)
          - \`.msi\` installer

          Built from \`${SHA}\`.
          EOF

          gh release create "$TAG" \
            --title "DB Studio $TAG" \
            --target "$SHA" \
            --notes-file /tmp/notes.md \
            $PRERELEASE

# ── 2. Build on each platform ────────────────────────────────────────────────
  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            name: linux
            args: ''
          - platform: windows-latest
            name: windows
            args: ''
          - platform: macos-latest
            name: macos-aarch64
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            name: macos-x64
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    name: build-${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.name, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential

      - run: npm ci

      # Run tauri build directly so we capture signed artifacts before
      # anything can overwrite or delete them.
      - name: Build
        run: npx tauri build ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ── macOS aarch64 ───────────────────────────────────────────────────────
      - name: Upload macOS aarch64 artifacts
        if: matrix.name == 'macos-aarch64'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          DIR="src-tauri/target/aarch64-apple-darwin/release/bundle"

          # Copy updater bundle with stable name (no version) so the URL never changes
          cp "$DIR/macos/db-studio.app.tar.gz"     db-studio_aarch64.app.tar.gz
          cp "$DIR/macos/db-studio.app.tar.gz.sig" updater.sig

          gh release upload "$TAG" \
            "$DIR/dmg/db-studio_${VERSION}_aarch64.dmg" \
            db-studio_aarch64.app.tar.gz \
            --clobber

      # ── macOS x64 ───────────────────────────────────────────────────────────
      - name: Upload macOS x64 artifacts
        if: matrix.name == 'macos-x64'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          DIR="src-tauri/target/x86_64-apple-darwin/release/bundle"

          cp "$DIR/macos/db-studio.app.tar.gz"     db-studio_x64.app.tar.gz
          cp "$DIR/macos/db-studio.app.tar.gz.sig" updater.sig

          gh release upload "$TAG" \
            "$DIR/dmg/db-studio_${VERSION}_x64.dmg" \
            db-studio_x64.app.tar.gz \
            --clobber

      # ── Linux ───────────────────────────────────────────────────────────────
      - name: Upload Linux artifacts
        if: matrix.name == 'linux'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          DIR="src-tauri/target/release/bundle"

          cp "$DIR/appimage/db-studio_${VERSION}_amd64.AppImage.tar.gz"     db-studio_amd64.AppImage.tar.gz
          cp "$DIR/appimage/db-studio_${VERSION}_amd64.AppImage.tar.gz.sig" updater.sig

          gh release upload "$TAG" \
            "$DIR/deb/db-studio_${VERSION}_amd64.deb" \
            "$DIR/rpm/db-studio-${VERSION}-1.x86_64.rpm" \
            "$DIR/appimage/db-studio_${VERSION}_amd64.AppImage" \
            db-studio_amd64.AppImage.tar.gz \
            --clobber

      # ── Windows ─────────────────────────────────────────────────────────────
      - name: Upload Windows artifacts
        if: matrix.name == 'windows'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $dir     = "src-tauri/target/release/bundle"

          Copy-Item "$dir/nsis/db-studio_${version}_x64-setup.nsis.zip"     "db-studio_x64-setup.nsis.zip"
          Copy-Item "$dir/nsis/db-studio_${version}_x64-setup.nsis.zip.sig" "updater.sig"

          gh release upload "$env:TAG" `
            "$dir/msi/db-studio_${version}_x64_en-US.msi" `
            "$dir/nsis/db-studio_${version}_x64-setup.exe" `
            "db-studio_x64-setup.nsis.zip" `
            --clobber

      - name: Save updater sig as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sig-${{ matrix.name }}
          path: updater.sig
          if-no-files-found: warn

# ── 3. Combine signatures into latest.json ───────────────────────────────────
  publish-updater-json:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all sig artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sig-*

      - name: Generate and upload latest.json
        env:
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          export VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          export BASE="https://github.com/broisnischal/studio/releases/download/${TAG}"

          node - <<'JSEOF'
          const fs = require('fs')
          const { VERSION, BASE } = process.env

          const read = (f) => { try { return fs.readFileSync(f, 'utf8').trim() } catch { return '' } }

          const platforms = {}
          const add = (key, sigFile, url) => {
            const sig = read(sigFile)
            if (sig) platforms[key] = { signature: sig, url }
            else console.warn(`⚠  no sig at ${sigFile} — skipping ${key}`)
          }

          add('darwin-aarch64', 'sig-macos-aarch64/updater.sig', `${BASE}/db-studio_aarch64.app.tar.gz`)
          add('darwin-x86_64',  'sig-macos-x64/updater.sig',     `${BASE}/db-studio_x64.app.tar.gz`)
          add('linux-x86_64',   'sig-linux/updater.sig',         `${BASE}/db-studio_amd64.AppImage.tar.gz`)
          add('windows-x86_64', 'sig-windows/updater.sig',       `${BASE}/db-studio_x64-setup.nsis.zip`)

          const out = {
            version: VERSION,
            notes: `See https://github.com/broisnischal/studio/releases/tag/v${VERSION}`,
            pub_date: new Date().toISOString(),
            platforms,
          }

          fs.writeFileSync('latest.json', JSON.stringify(out, null, 2))
          console.log(JSON.stringify(out, null, 2))

          if (!Object.keys(platforms).length) { console.error('ERROR: no signatures found'); process.exit(1) }
          JSEOF

      - name: Upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.RELEASE_TAG }}
        run: gh release upload "$TAG" latest.json --clobber
