<!doctype html>
<html lang="en" class="h-full">
  <head>
    <script>
      try {
        const raw = localStorage.getItem('db-studio:settings')
        const theme = raw ? JSON.parse(raw).theme : 'dark'
        if (theme !== 'light') document.documentElement.classList.add('dark')
      } catch (_) {
        document.documentElement.classList.add('dark')
      }
      ;(function () {
        var ua = navigator.userAgent || ''
        var platform = (navigator.userAgentData && navigator.userAgentData.platform) || navigator.platform || ''
        var os = 'linux'
        if (/Win/i.test(platform) || /Windows/i.test(ua)) os = 'windows'
        else if (/Mac/i.test(platform) || /Macintosh|Mac OS/i.test(ua)) os = 'macos'
        document.documentElement.dataset.os = os
      })()
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>DB Studio</title>
  </head>
  <body class="h-full">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
