<!doctype html>
<html lang="en" class="h-full" style="opacity:0;transition:opacity 200ms ease">
  <head>
    <script>
      try {
        const raw = localStorage.getItem('db-studio:settings')
        const parsed = raw ? JSON.parse(raw) : null
        const valid = [
          'light', 'notion', 'github-light', 'vscode-light', 'linear-light',
          'linear', 'cursor', 'raycast', 'vercel',
          'vscode', 'github', 'onedark', 'catppuccin', 'rosepine',
          'dark', 'vitesse', 'midnight', 'slate',
          'nord', 'dracula', 'forest', 'solarized',
        ]
        let theme = parsed?.theme
        if (!valid.includes(theme)) {
          // No saved preference — follow the OS
          const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches !== false
          theme = prefersDark ? 'dark' : 'light'
        }
        document.documentElement.dataset.theme = theme
        if (theme !== 'light') document.documentElement.classList.add('dark')
        let zoom = 1
        if (parsed?.zoom != null) zoom = Number(parsed.zoom)
        else if (parsed?.fontSize != null) zoom = Number(parsed.fontSize) / 14
        if (Number.isFinite(zoom) && zoom > 0) {
          const fontPx = Math.round(13 * zoom)
          const root = document.documentElement
          root.style.setProperty('--app-zoom', String(zoom))
          root.style.setProperty('--app-font-size', fontPx + 'px')
        }
      } catch (_) {
        const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches !== false
        document.documentElement.dataset.theme = prefersDark ? 'dark' : 'light'
        if (prefersDark) document.documentElement.classList.add('dark')
      }
      ;(function () {
        var ua = navigator.userAgent || ''
        var platform = (navigator.userAgentData && navigator.userAgentData.platform) || navigator.platform || ''
        var os = 'linux'
        if (/Win/i.test(platform) || /Windows/i.test(ua)) os = 'windows'
        else if (/Mac/i.test(platform) || /Macintosh|Mac OS/i.test(ua)) os = 'macos'
        document.documentElement.dataset.os = os
      })()
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="format-detection" content="telephone=no, email=no, address=no" />
    <title>DB Studio</title>
  </head>
  <body class="h-full">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
